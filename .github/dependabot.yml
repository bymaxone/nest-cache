# Dependabot keeps dependencies and GitHub Actions up to date.
#
# Policy alignment (see project memory): updates are proposed as PRs only — they
# never merge automatically — so the >7-day-old / peer-dependency review rules can
# still be applied by a human before anything lands.
version: 2

updates:
  # npm devDependencies and peerDependencies. Production `dependencies` is empty by
  # design (zero direct deps), so this effectively tracks tooling and peer ranges.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Batch low-risk dev tooling bumps into a single PR to cut review noise.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Peer dependencies define the supported consumer range — bumping them is a
      # breaking-change decision made deliberately, not by an automated minor bump.
      - dependency-name: '@nestjs/*'
        update-types: [version-update:semver-major]
      - dependency-name: ioredis
        update-types: [version-update:semver-major]
      # TypeScript 6 and ESLint 10 are known to break the lint/typecheck gate and
      # are intentionally held back until revisited.
      - dependency-name: typescript
        update-types: [version-update:semver-major]
      - dependency-name: eslint
        update-types: [version-update:semver-major]

  # The workflow actions themselves (checkout, setup-node, pnpm, etc.).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
